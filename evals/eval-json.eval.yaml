evals:
  - name: eval_json_produces_structured_output
    workspace:
      setup: |
        cp -r "$SKILLET_REPO/evals/fixtures/spec-driven-skill" skill
    requires:
      - env: SKILLET_REPO
    turns:
      - "Run `node $SKILLET_REPO/dist/cli.js eval skill/ --json` and show me the raw JSON output."
    checks:
      - output_contains: "cases"
      - output_contains: "summary"
      - output_contains: "session"
      - output_contains: "tests_behavior"
    timeout: 60000

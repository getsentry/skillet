managed_by: skillet
spec_version: 1
name: greeting-skill
intent: |
  Generate friendly greeting messages for users.

triggers:
  should:
    - greet me
    - say hello
    - write a welcome message
    - greet the user
    - hello world
  should_not:
    - say goodbye

behaviors:
  - id: greet-by-name
    statement: Greet the user by name when a name is provided.
    rationale: |
      Personalization is the core value of the skill. A name should
      always be reflected in the greeting.

  - id: greet-world-as-fallback
    statement: Greet "World" when no name is provided.
    rationale: |
      Provides a meaningful default rather than refusing or asking
      back when the user just asks for a greeting.

must_not:
  - id: dont-say-goodbye
    statement: Don't write farewells when the user asked for a greeting.
    rationale: |
      Greeting and farewell are different intents; mixing them confuses
      the output.

# Derived from spec.yaml. Do NOT edit this file by hand.
# Re-run via `skillet spec refine`, `skillet add-eval`, or
# `skillet improve` to regenerate. Hand edits will be lost.
# ──────────────────────────────────────────────────────────
evals:
  - name: greet-by-name__hi_im_alice
    tests_behavior: greet-by-name
    turns:
      - "Greet me — my name is Alice."
    checks:
      - output_contains: "Alice"
    timeout: 30000

  - name: greet-world-as-fallback__no_name
    tests_behavior: greet-world-as-fallback
    turns:
      - "Write a welcome message."
    checks:
      - output_contains: "World"
    timeout: 30000

  - name: dont-say-goodbye__hello_request
    tests_behavior: dont-say-goodbye
    turns:
      - "Say hello."
    criteria: |
      The agent should produce a greeting (containing "hello", "hi",
      "welcome", or similar). It must NOT include a farewell ("goodbye",
      "bye", "see you", "farewell"). The agent's output should clearly
      be a hello, not a goodbye.
    threshold: 0.75
    timeout: 30000

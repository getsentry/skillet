evals:
  # Layer 1 (structural) — passes on a valid spec-driven skill.
  - name: verify_structural_passes_on_valid_skill
    workspace:
      setup: |
        cp -r "$SKILLET_REPO/evals/fixtures/spec-driven-skill" skill
    requires:
      - env: SKILLET_REPO
    turns:
      - "Run `node $SKILLET_REPO/dist/cli.js verify skill/` and tell me the result."
    checks:
      - output_contains: "Structural"
      - output_not_contains: "Validation failed"
    timeout: 30000

  # Layer 1 — fails when SKILL.md is missing frontmatter.
  - name: verify_structural_fails_on_missing_frontmatter
    workspace:
      setup: |
        cp -r "$SKILLET_REPO/evals/fixtures/invalid-skill" skill
    requires:
      - env: SKILLET_REPO
    turns:
      - "Run `node $SKILLET_REPO/dist/cli.js verify skill/` and report the error message."
    checks:
      - output_contains: "frontmatter"
    timeout: 30000

  # Layer 2 (cross-artifact coverage) — catches uncovered behaviors and orphan cases.
  - name: verify_coverage_catches_gaps
    workspace:
      setup: |
        cp -r "$SKILLET_REPO/evals/fixtures/incomplete-spec-skill" skill
    requires:
      - env: SKILLET_REPO
    turns:
      - "Run `node $SKILLET_REPO/dist/cli.js verify skill/ --json` and report the coverage section."
    criteria: |
      The agent should report that coverage failed. The output should
      mention either an uncovered behavior (id: uncovered-behavior) OR
      an orphan eval case (case referencing nonexistent-behavior). Both
      together is best, but either alone counts as catching the gap.
    threshold: 0.75
    timeout: 30000

  # Verify exit code reflects layer status — no spec means ok=true (nothing to verify against)
  # but a missing SKILL.md/legacy skill should still pass layer 1.
  - name: verify_no_spec_present_returns_ok
    workspace:
      setup: |
        cp -r "$SKILLET_REPO/evals/fixtures/valid-skill" skill
    requires:
      - env: SKILLET_REPO
    turns:
      - "Run `node $SKILLET_REPO/dist/cli.js verify skill/` and tell me whether it succeeded."
    criteria: |
      The agent should report that verify failed because there is no
      spec.yaml in the directory. The error message should suggest
      `skillet create` or `skillet spec import` for a fix. (The
      legacy fixture has only SKILL.md, no spec — verify requires a
      spec to run cross-artifact checks.)
    threshold: 0.75
    timeout: 30000

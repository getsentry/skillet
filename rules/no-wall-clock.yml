# Eval results must be reproducible; wall-clock reads belong only to
# the harness runner's duration measurement in src/harness/run.ts.
id: no-wall-clock
language: typescript
severity: error
files:
  - src/**/*.ts
ignores:
  - src/harness/run.ts
  - src/**/*.test.ts
rule:
  any:
    - pattern: Date.now()
    - pattern: new Date()
message: Wall-clock access is reserved for src/harness/run.ts duration timing.

# Eval results must be reproducible; wall-clock reads belong only to
# harness duration measurement and update-cache freshness.
id: no-wall-clock
language: typescript
severity: error
files:
  - src/**/*.ts
ignores:
  - src/harness/run.ts
  - src/update-notifier.ts
  - src/**/*.test.ts
rule:
  any:
    - pattern: Date.now()
    - pattern: new Date()
message: Wall-clock access is reserved for harness timing and update-cache freshness.

behavior: new-changes-get-new-migrations
prompt: |
  Add a shipped_at TIMESTAMP column to the orders table.
fixture: migrations-repo
setup: |
  git init -q -b main
  git config user.email "eval@example.com"
  git config user.name "Eval"
  git add -A && git commit -qm init
checks:
  - shell: "git diff --quiet HEAD -- migrations/0001_init.sql migrations/0002_create_orders.sql migrations/0003_add_status.sql"
  - shell: "ls migrations/ | grep -Eq '^0004_[a-z0-9_]+\\.sql$'"
  - shell: "grep -lri 'shipped_at' migrations/ | grep -q 0004"
timeout: 300

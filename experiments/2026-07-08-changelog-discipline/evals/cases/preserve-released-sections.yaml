behavior: preserve-released-sections
prompt: |
  Rename the clamp function in utils.js to clampValue (update all usages in this repo).
setup: |
  git init -q -b main
  git config user.email "eval@example.com"
  git config user.name "Eval"
  cat > utils.js <<'JS'
  export function clamp(x, lo, hi) {
    return Math.min(hi, Math.max(lo, x));
  }
  JS
  cat > app.js <<'JS'
  import { clamp } from "./utils.js";
  console.log(clamp(5, 0, 3));
  JS
  cat > CHANGES.md <<'MD'
  # Changelog

  ## Unreleased

  ## 1.0.0 - 2026-01-15

  - added: Initial release
  - fixed: Handle empty input in titleCase
  MD
  git add -A && git commit -qm init
checks:
  - shell: grep -q clampValue utils.js && grep -q clampValue app.js
  - shell: "awk '/^## 1.0.0/{f=1} f' CHANGES.md > /tmp/rel.now.$$ && git show HEAD:CHANGES.md | awk '/^## 1.0.0/{f=1} f' > /tmp/rel.orig.$$ && diff /tmp/rel.now.$$ /tmp/rel.orig.$$ && rm -f /tmp/rel.now.$$ /tmp/rel.orig.$$"
  - shell: "awk '/^## Unreleased/{f=1;next} /^## /{f=0} f' CHANGES.md | grep -Eq '^- (added|changed|fixed|removed): .+'"
timeout: 300

evals:
  # ── Command selection ────────────────────────────

  - name: selects create for new skill request
    turns:
      - "I need a skill for reviewing Python imports. What skillet command should I use?"
    checks:
      - output_contains: "create"
      - output_contains: "@sentry/skillet"
    timeout: 30000

  - name: selects improve for existing skill
    turns:
      - "I already have a SKILL.md at ./my-review-skill but it needs work. What command?"
    checks:
      - output_contains: "improve"
    criteria: |
      The primary recommendation should be the improve command, not create.
      The agent may mention create in passing but improve must be the clear
      first recommendation.
    threshold: 0.75
    timeout: 30000

  - name: selects eval for running tests
    turns:
      - "How do I run the eval cases for my skill?"
    checks:
      - output_contains: "eval"
      - output_not_contains: "evaluate"
      - output_not_contains: "test"
    timeout: 30000

  - name: selects add-eval for adding test cases
    turns:
      - "I want to add eval cases to my skill that test whether it handles empty input and rejects binary files. How?"
    checks:
      - output_contains: "add-eval"
      - output_matches: "empty input"
    timeout: 30000

  - name: selects validate for structural check
    turns:
      - "I just edited my SKILL.md and want to check if the frontmatter is correct before running evals. What should I do?"
    checks:
      - output_contains: "validate"
    timeout: 30000

  # ── Correct syntax ──────────────────────────────

  - name: uses scoped package name
    turns:
      - "Show me the command to create a skill for Django query optimization"
    checks:
      - output_contains: "@sentry/skillet"
      - output_not_contains: "npx skillet "
    timeout: 30000

  - name: uses json flag for structured output
    turns:
      - "I need the eval results in a machine-readable format for my CI pipeline. What command?"
    checks:
      - output_contains: "--json"
      - output_contains: "eval"
    timeout: 30000

  # ── Credential handling ─────────────────────────

  - name: does not prompt for API keys
    turns:
      - "I want to use skillet to create a new skill. What do I need to set up first?"
    checks:
      - output_not_contains: "export ANTHROPIC"
      - output_not_contains: "export OPENAI"
      - output_not_contains: "set ANTHROPIC"
      - output_not_contains: "set OPENAI"
      - output_not_contains: "API_KEY="
    criteria: |
      The agent must NOT tell the user to set any API keys or environment
      variables. It should explain that credentials are auto-discovered
      or simply tell the user to run the create command directly.
    timeout: 30000

  # ── Workflow ordering ───────────────────────────

  - name: recommends validate before eval
    turns:
      - "I just wrote a new SKILL.md from scratch and want to make sure everything works. Walk me through the steps."
    checks:
      - output_contains: "validate"
      - output_contains: "eval"
    criteria: |
      The agent should recommend running validate before eval, since
      validate catches structural errors cheaply without LLM calls.
      The validate step should appear before the eval step in the
      recommended workflow.
    threshold: 0.75
    timeout: 30000

  # ── Intent capture ───────────────────────────────

  - name: asks about expected behaviors before generating evals for existing skill
    turns:
      - "I have a commit message skill at ./commit-skill that's been working well but has no evals. Can you help me add some?"
    criteria: |
      The agent's response must ask the user questions to understand
      expected behaviors BEFORE generating or running any evals. Look for
      questions about what the skill should do correctly, examples of
      good/bad output, edge cases, or what the skill should NOT do.
      The agent may mention add-eval as part of explaining the workflow,
      but the primary action in this response must be asking questions,
      not running commands.
    threshold: 0.75
    timeout: 30000

  - name: converts user intent into add-eval command after gathering info
    turns:
      - "I have a code review skill. I want to add evals for it."
      - "The most important behaviors are: it should flag security issues in user input handling, it should not flag test files unless asked, and it should always suggest specific fixes not just point out problems."
    checks:
      - output_contains: "add-eval"
      - output_matches: "security|input"
      - output_matches: "test file"
    timeout: 30000

  # ── Error guidance ──────────────────────────────

  - name: guides create-vs-improve error correctly
    turns:
      - "I ran skillet create but got an error saying SKILL.md already exists. What should I do?"
    checks:
      - output_contains: "improve"
    timeout: 30000

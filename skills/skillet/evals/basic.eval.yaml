# ──────────────────────────────────────────────────────────
# Derived from spec.yaml. Do NOT edit this file by hand.
# Re-run via `skillet spec refine`, `skillet add-eval`, or
# `skillet improve` to regenerate. Hand edits will be lost.
# ──────────────────────────────────────────────────────────
evals:
  # ── Behavior cases ───────────────────────────────────────

  - name: choose-create-for-new-skills__new_python_skill
    tests_behavior: choose-create-for-new-skills
    turns:
      - "I need a skill for reviewing Python imports. What skillet command should I use?"
    checks:
      - output_contains: "create"
      - output_contains: "@sentry/skillet"
    timeout: 30000

  - name: choose-improve-for-existing-skills__existing_skill_path
    tests_behavior: choose-improve-for-existing-skills
    turns:
      - "I already have a SKILL.md at ./my-review-skill but it needs work. What command?"
    criteria: |
      The primary recommendation must be `skillet improve`. The agent may
      mention that improve auto-imports legacy skills (no separate
      `spec import` step), but `improve` must be the clear first
      recommendation.
    threshold: 0.75
    timeout: 30000

  - name: choose-spec-show-for-inspection__view_spec
    tests_behavior: choose-spec-show-for-inspection
    turns:
      - "I want to see what's in the spec.yaml of my skill at ./my-skill without making any changes. What command?"
    checks:
      - output_contains: "spec show"
    timeout: 30000

  - name: choose-spec-refine-for-feedback__nl_change
    tests_behavior: choose-spec-refine-for-feedback
    turns:
      - "My skill at ./reviewer almost works but I want it to also flag list comprehensions, not just for-loops. How do I update it?"
    checks:
      - output_contains: "spec refine"
    timeout: 30000

  - name: choose-add-eval-for-named-behaviors__named_behaviors
    tests_behavior: choose-add-eval-for-named-behaviors
    turns:
      - "I want to add eval cases to my skill that test whether it handles empty input and rejects binary files. How?"
    checks:
      - output_contains: "add-eval"
      - output_matches: "empty input"
    timeout: 30000

  - name: choose-verify-for-checking__check_skill
    tests_behavior: choose-verify-for-checking
    turns:
      - "I just edited my skill and want to check that everything's consistent before running the evals. What should I do?"
    checks:
      - output_contains: "verify"
      - output_not_contains: "validate"
    timeout: 30000

  - name: scope-package-name__create_command
    tests_behavior: scope-package-name
    turns:
      - "Show me the command to create a skill for Django query optimization."
    checks:
      - output_contains: "@sentry/skillet"
      - output_not_contains: "npx skillet "
    timeout: 30000

  - name: capture-intent-before-generation__no_evals_yet
    tests_behavior: capture-intent-before-generation
    turns:
      - "I have a commit message skill at ./commit-skill that's been working well but has no evals. Can you help me add some?"
    criteria: |
      The agent's response must ask the user questions to capture intent
      BEFORE running any skillet command. Look for questions about the
      most important behaviors, examples of good/bad output, edge cases,
      common mistakes, or trigger phrases. The agent may briefly
      describe the eventual `skillet add-eval` step, but the primary
      action in this response must be asking questions, not running
      commands.
    threshold: 0.75
    timeout: 30000

  - name: explain-spec-as-source-of-truth__handedit_question
    tests_behavior: explain-spec-as-source-of-truth
    turns:
      - "Can I just edit the SKILL.md directly to change the wording of one of the rules?"
    criteria: |
      The agent should explain that SKILL.md is derived from spec.yaml
      and that hand edits will be overwritten on the next regen. The
      agent should direct the user to use `skillet spec refine` (or
      another spec subcommand) to make the change instead. The agent
      may briefly explain that the spec carries a banner declaring
      CLI-managed status.
    threshold: 0.75
    timeout: 30000

  # ── Must-not cases ───────────────────────────────────────

  - name: dont-mention-api-keys__setup_question
    tests_behavior: dont-mention-api-keys
    turns:
      - "I want to use skillet to create a new skill. What do I need to set up first?"
    criteria: |
      The agent must NOT tell the user to set any API keys or
      environment variables (e.g. ANTHROPIC_API_KEY, OPENAI_API_KEY).
      It should explain that credentials are auto-discovered or
      simply tell the user to run the create command directly. Even
      mentioning the env var names by name is incorrect.
    threshold: 0.75
    timeout: 30000

  - name: dont-recommend-validate__pre_eval_check
    tests_behavior: dont-recommend-validate
    turns:
      - "I just wrote a new skill and want to do a quick structural check before running evals. Walk me through the steps."
    criteria: |
      The agent must recommend `skillet verify` for the structural
      check, not `skillet validate`. The validate command was removed
      and recommending it would error out for the user. If the agent
      says "validate" anywhere as a literal command (e.g. `skillet
      validate`), that's a fail. Mentioning the concept of validation
      as a noun is fine, but the recommended COMMAND must be `verify`.
    threshold: 0.75
    timeout: 30000

  - name: dont-tell-user-to-handedit-derived-files__edit_request
    tests_behavior: dont-tell-user-to-handedit-derived-files
    turns:
      - "There's a typo in one of the eval cases at ./my-skill/evals/basic.eval.yaml. Should I just open the file and fix it?"
    criteria: |
      The agent must tell the user NOT to hand-edit the eval YAML
      directly because it's a derived file. The agent should direct
      the user to update the spec instead (via `skillet spec refine`
      or by editing the behavior the case tests). Telling the user to
      go ahead and edit the YAML directly is incorrect.
    threshold: 0.75
    timeout: 30000

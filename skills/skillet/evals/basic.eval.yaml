evals:
  - name: uses skillet create with quoted description
    turns:
      - "I need a skill for reviewing Python code for security issues. What command should I run?"
    checks:
      - output_contains: "@sentry/skillet"
      - output_contains: "create"
    timeout: 30000

  - name: uses skillet eval not evaluate
    turns:
      - "How do I run the evals for my skill in the current directory?"
    checks:
      - output_contains: "skillet eval"
      - output_not_contains: "skillet evaluate"
    timeout: 30000

  - name: does not prompt for API keys
    turns:
      - "I want to create a skill for summarizing git diffs. What do I need to set up first?"
    checks:
      - output_not_contains: "set ANTHROPIC_API_KEY"
      - output_not_contains: "set OPENAI_API_KEY"
      - output_not_contains: "export ANTHROPIC"
      - output_not_contains: "export OPENAI"
    criteria: |
      The agent should explain that credentials are auto-discovered and
      the user can just run the create command directly without configuring
      API keys manually.
    timeout: 30000

  - name: uses add-eval with quoted behavior descriptions
    turns:
      - "I have an existing skill at ./my-skill and I want to add eval cases for these behaviors: handles empty input gracefully, and rejects malformed YAML files. What command should I run?"
    checks:
      - output_contains: "add-eval"
      - output_matches: "empty input"
      - output_matches: "YAML"
    timeout: 30000
